<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>使用管理后台</title><style>body{margin:0;background:#0d1117;color:#e6edf3;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}main{max-width:1320px;margin:auto;padding:28px}h1{margin:0}header{display:flex;justify-content:space-between;align-items:center;gap:16px}button,input,select{padding:8px 10px;border-radius:7px;border:1px solid #30363d;background:#161b22;color:inherit}button{cursor:pointer}.cards{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;margin:20px 0}.card,section{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px}.num{font-size:25px;font-weight:700}section{margin-top:16px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #30363d;text-align:left;vertical-align:top}small{color:#8b949e}.row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.bad,.danger{color:#ff7b72}.ok{color:#7ee787}.quota-grid{display:grid;grid-template-columns:repeat(3,minmax(72px,1fr));gap:6px}.quota-field{display:grid;gap:3px;font-size:12px;color:#8b949e}.quota-field input{width:70px;box-sizing:border-box}.actions{display:flex;gap:6px;flex-wrap:wrap}.actions button{padding:6px 8px}.message{min-height:21px;margin:8px 0}.message.error{color:#ff7b72}.message.success{color:#7ee787}dialog{width:min(420px,calc(100% - 40px));border:1px solid #30363d;border-radius:12px;background:#161b22;color:#e6edf3;padding:20px}dialog::backdrop{background:#0009}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.dialog-field{display:grid;gap:6px}.dialog-field input{width:100%;box-sizing:border-box}@media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}table{font-size:12px;display:block;overflow:auto}}</style></head><body><main>
<header><div><h1>使用管理后台</h1><small id="who"></small></div><div><button onclick="returnToWorkspace()">返回工作台</button><button id="logout">退出</button></div></header>
<div class="cards"><div class="card">总调用<div class="num" id="total">-</div></div><div class="card">成功<div class="num ok" id="success">-</div></div><div class="card">失败<div class="num bad" id="failed">-</div></div><div class="card">图像<div class="num" id="image">-</div></div><div class="card">视频 / LLM<div class="num" id="other">-</div></div></div>
<section><h2>告警红线</h2><div class="row"><label>图像/小时 <input id="pImage" type="number" min="0"></label><label>视频/小时 <input id="pVideo" type="number" min="0"></label><label>LLM/小时 <input id="pLlm" type="number" min="0"></label><button id="savePolicy">保存规则</button></div><div id="alerts"></div></section>
<section><h2>用户与配额</h2><small>每日额度填 0 表示不限制。修改后请点击该用户的“保存配额”。</small><div id="userMessage" class="message" role="status"></div><table><thead><tr><th>姓名 / 账号</th><th>部门</th><th>角色</th><th>状态</th><th>每日额度</th><th>操作</th></tr></thead><tbody id="users"></tbody></table></section>
<section><h2>用量明细</h2><div class="row"><input id="filter" placeholder="账号、姓名、模型或功能"><select id="usageUser"><option value="">全部用户</option></select><select id="usageCategory"><option value="">全部类型</option><option value="image">图像</option><option value="video">视频</option><option value="llm">LLM</option></select><select id="usageSource"><option value="">全部来源</option><option value="web">网页</option><option value="chrome-extension">浏览器扩展</option><option value="photoshop">Photoshop</option></select><select id="usageStatus"><option value="">全部状态</option><option value="succeeded">成功</option><option value="failed">失败</option></select><button id="applyUsageFilters">筛选</button><button id="refresh">刷新</button></div><table><thead><tr><th>时间</th><th>用户</th><th>来源</th><th>功能 / 模型</th><th>状态</th><th>耗时</th></tr></thead><tbody id="events"></tbody></table><div class="row" style="justify-content:flex-end;align-items:center"><small id="usageCount"></small><label>每页 <select id="usageLimit"><option>10</option><option selected>20</option><option>50</option><option>100</option></select></label><button id="usagePrev">上一页</button><span id="usagePage"></span><button id="usageNext">下一页</button></div></section>
</main><dialog id="passwordDialog"><form id="passwordForm"><h2>重置用户密码</h2><p id="passwordTarget"></p><label class="dialog-field">新密码（至少 10 位）<input id="newPassword" type="password" minlength="10" maxlength="200" required autocomplete="new-password"></label><div class="dialog-actions"><button type="button" onclick="q('#passwordDialog').close()">取消</button><button id="confirmPassword" type="submit">确认重置</button></div></form></dialog><script>
const q=s=>document.querySelector(s);let userRows=[],usagePage=1,usageTotal=0;function returnToWorkspace(){localStorage.setItem('studio_active_page','zimage');if(window.parent!==window&&typeof window.parent.switchUI==='function'){const trigger=window.parent.document.querySelector("[onclick*=\"'zimage'\"]");window.parent.switchUI(trigger,'zimage');return}window.location.href='/'}async function get(p){let r=await fetch(p);if(r.status===401)window.top.location.href='/static/login.html?v=2026.07.17.1784513061';if(r.status===403){document.body.innerHTML='<main><h1>无管理员权限</h1></main>';throw Error('forbidden')}let d=await r.json();if(!r.ok)throw Error(d.detail);return d}async function send(p,m,b){let r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});let d=await r.json();if(!r.ok)throw Error(d.detail);return d}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','>':'&gt;','<':'&lt;','"':'&quot;',"'":'&#39;'}[c]))}function showMessage(text,error=false){let el=q('#userMessage');el.textContent=text;el.className='message '+(error?'error':'success')}async function load(){let [me,s,u,a,p]=await Promise.all([get('/api/auth/me'),get('/api/admin/usage/summary'),get('/api/admin/users'),get('/api/admin/alerts'),get('/api/admin/usage-policy')]);q('#who').textContent=`${me.user.name} · ${me.user.username}`;q('#total').textContent=s.total;q('#success').textContent=s.succeeded;q('#failed').textContent=s.failed;q('#image').textContent=s.by_category.image;q('#other').textContent=`${s.by_category.video} / ${s.by_category.llm}`;q('#pImage').value=p.alert_thresholds.image;q('#pVideo').value=p.alert_thresholds.video;q('#pLlm').value=p.alert_thresholds.llm;userRows=u.users;q('#usageUser').innerHTML='<option value="">全部用户</option>'+u.users.map(x=>`<option value="${x.id}">${esc(x.name)}（${esc(x.username)}）</option>`).join('');q('#users').innerHTML=u.users.map(x=>`<tr><td>${esc(x.name)}<small><br>${esc(x.username)}</small></td><td>${esc(x.department)}</td><td>${esc(x.role)}</td><td>${x.enabled?'启用':'停用'}</td><td><div class="quota-grid"><label class="quota-field">图像<input data-quota="daily_image" data-user="${x.id}" type="number" min="0" value="${x.quota?.daily_image||0}"></label><label class="quota-field">视频<input data-quota="daily_video" data-user="${x.id}" type="number" min="0" value="${x.quota?.daily_video||0}"></label><label class="quota-field">LLM<input data-quota="daily_llm" data-user="${x.id}" type="number" min="0" value="${x.quota?.daily_llm||0}"></label></div></td><td><div class="actions"><button onclick="saveQuota('${x.id}')">保存配额</button><button onclick="toggle('${x.id}',${!x.enabled})">${x.enabled?'停用':'启用'}</button><button onclick="openPasswordReset('${x.id}')">重置密码</button><button class="danger" onclick="deleteUser('${x.id}')">删除</button></div></td></tr>`).join('');q('#alerts').innerHTML=a.alerts.map(x=>`<div class="${x.acknowledged?'':'bad'}">${esc(x.username)}：${esc(x.category)} 在一小时内 ${x.count}/${x.threshold} 次 ${x.acknowledged?'（已确认）':`<button onclick="ack('${x.id}')">确认</button>`}</div>`).join('')||'<small>暂无告警</small>';await loadUsage()}
function renderEvents(rows){q('#events').innerHTML=rows.map(x=>`<tr><td>${esc(x.created_at_iso)}</td><td>${esc(x.name||x.username)}<small><br>${esc(x.department)}</small></td><td>${esc(x.client_source)}</td><td>${esc(x.function)}<small><br>${esc(x.provider)} / ${esc(x.model)}</small></td><td class="${x.status==='failed'?'bad':'ok'}">${esc(x.status)}</td><td>${x.duration_ms||0}ms</td></tr>`).join('')||'<tr><td colspan="6"><small>没有符合条件的用量记录</small></td></tr>'}async function loadUsage(){let limit=+q('#usageLimit').value,params=new URLSearchParams({limit,offset:(usagePage-1)*limit});[['q','filter'],['user_id','usageUser'],['category','usageCategory'],['client_source','usageSource'],['status','usageStatus']].forEach(([key,id])=>{let value=q('#'+id).value.trim();if(value)params.set(key,value)});let data=await get('/api/admin/usage?'+params);usageTotal=data.total;let pages=Math.max(1,Math.ceil(usageTotal/limit));if(usagePage>pages){usagePage=pages;return loadUsage()}renderEvents(data.events);q('#usageCount').textContent=`共 ${usageTotal} 条`;q('#usagePage').textContent=`第 ${usagePage} / ${pages} 页`;q('#usagePrev').disabled=usagePage<=1;q('#usageNext').disabled=usagePage>=pages}
async function run(action,success){try{await action();showMessage(success);await load()}catch(e){showMessage(e.message||'操作失败',true)}}async function toggle(id,enabled){run(()=>send('/api/admin/users/'+id,'PATCH',{enabled}),enabled?'账号已启用。':'账号已停用。')}async function saveQuota(id){let user=userRows.find(x=>x.id===id),quota={...(user?.quota||{})};document.querySelectorAll(`[data-user="${id}"]`).forEach(el=>quota[el.dataset.quota]=Math.max(0,+el.value||0));run(()=>send('/api/admin/users/'+id,'PATCH',{quota}),'配额已保存。')}let resetUserId='';function openPasswordReset(id){let user=userRows.find(x=>x.id===id);resetUserId=id;q('#passwordTarget').textContent=`为 ${user?.name||user?.username||'该用户'} 设置临时密码。`;q('#newPassword').value='';q('#passwordDialog').showModal();q('#newPassword').focus()}q('#passwordForm').onsubmit=async e=>{e.preventDefault();let password=q('#newPassword').value;if(password.length<10)return;q('#passwordDialog').close();run(()=>send(`/api/admin/users/${resetUserId}/reset-password`,'POST',{new_password:password}),'密码已重置，旧会话已注销。')};async function deleteUser(id){let user=userRows.find(x=>x.id===id);if(!confirm(`确定删除账号“${user?.username||''}”吗？此操作不可撤销。`))return;run(()=>send('/api/admin/users/'+id,'DELETE'),'账号已删除。')}async function ack(id){await send('/api/admin/alerts/'+id,'PATCH',{acknowledged:true});load()}window.toggle=toggle;window.saveQuota=saveQuota;window.openPasswordReset=openPasswordReset;window.deleteUser=deleteUser;window.ack=ack;window.returnToWorkspace=returnToWorkspace;q('#savePolicy').onclick=async()=>{await send('/api/admin/usage-policy','PUT',{alert_thresholds:{image:+q('#pImage').value,video:+q('#pVideo').value,llm:+q('#pLlm').value}});load()};q('#applyUsageFilters').onclick=()=>{usagePage=1;loadUsage()};q('#refresh').onclick=loadUsage;q('#filter').onkeydown=e=>{if(e.key==='Enter'){usagePage=1;loadUsage()}};q('#usageLimit').onchange=()=>{usagePage=1;loadUsage()};q('#usagePrev').onclick=()=>{if(usagePage>1){usagePage--;loadUsage()}};q('#usageNext').onclick=()=>{usagePage++;loadUsage()};q('#logout').onclick=async()=>{await send('/api/auth/logout','POST');window.top.location.href='/static/login.html?v=2026.07.17.1784513061'};load().catch(e=>console.error(e));
</script></body></html>
