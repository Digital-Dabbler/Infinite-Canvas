<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>使用管理后台</title><style>body{margin:0;background:#0d1117;color:#e6edf3;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}main{max-width:1320px;margin:auto;padding:28px}h1{margin:0}header{display:flex;justify-content:space-between;align-items:center;gap:16px}button,input,select{padding:8px 10px;border-radius:7px;border:1px solid #30363d;background:#161b22;color:inherit}button{cursor:pointer}.cards{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;margin:20px 0}.card,section{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px}.num{font-size:25px;font-weight:700}section{margin-top:16px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #30363d;text-align:left;vertical-align:top}small{color:#8b949e}.row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.bad{color:#ff7b72}.ok{color:#7ee787}@media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}table{font-size:12px;display:block;overflow:auto}}</style></head><body><main>
<header><div><h1>使用管理后台</h1><small id="who"></small></div><div><button onclick="returnToWorkspace()">返回工作台</button><button id="logout">退出</button></div></header>
<div class="cards"><div class="card">总调用<div class="num" id="total">-</div></div><div class="card">成功<div class="num ok" id="success">-</div></div><div class="card">失败<div class="num bad" id="failed">-</div></div><div class="card">图像<div class="num" id="image">-</div></div><div class="card">视频 / LLM<div class="num" id="other">-</div></div></div>
<section><h2>告警红线</h2><div class="row"><label>图像/小时 <input id="pImage" type="number" min="0"></label><label>视频/小时 <input id="pVideo" type="number" min="0"></label><label>LLM/小时 <input id="pLlm" type="number" min="0"></label><button id="savePolicy">保存规则</button></div><div id="alerts"></div></section>
<section><h2>用户与配额</h2><table><thead><tr><th>姓名 / 账号</th><th>部门</th><th>角色</th><th>状态</th><th>每日图 / 视频 / LLM</th><th>操作</th></tr></thead><tbody id="users"></tbody></table></section>
<section><h2>用量明细</h2><div class="row"><input id="filter" placeholder="账号、模型或功能关键字"><button id="refresh">刷新</button></div><table><thead><tr><th>时间</th><th>用户</th><th>来源</th><th>功能 / 模型</th><th>状态</th><th>耗时</th></tr></thead><tbody id="events"></tbody></table></section>
</main><script>
const q=s=>document.querySelector(s);let userRows=[];function returnToWorkspace(){localStorage.setItem('studio_active_page','zimage');if(window.parent!==window&&typeof window.parent.switchUI==='function'){const trigger=window.parent.document.querySelector("[onclick*=\"'zimage'\"]");window.parent.switchUI(trigger,'zimage');return}window.location.href='/'}async function get(p){let r=await fetch(p);if(r.status===401)window.top.location.href='/static/login.html?v=2026.07.17.1784513061';if(r.status===403){document.body.innerHTML='<main><h1>无管理员权限</h1></main>';throw Error('forbidden')}let d=await r.json();if(!r.ok)throw Error(d.detail);return d}async function send(p,m,b){let r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});let d=await r.json();if(!r.ok)throw Error(d.detail);return d}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','>':'&gt;','<':'&lt;','"':'&quot;',"'":'&#39;'}[c]))}async function load(){let [me,s,u,e,a,p]=await Promise.all([get('/api/auth/me'),get('/api/admin/usage/summary'),get('/api/admin/users'),get('/api/admin/usage?limit=100'),get('/api/admin/alerts'),get('/api/admin/usage-policy')]);q('#who').textContent=`${me.user.name} · ${me.user.username}`;q('#total').textContent=s.total;q('#success').textContent=s.succeeded;q('#failed').textContent=s.failed;q('#image').textContent=s.by_category.image;q('#other').textContent=`${s.by_category.video} / ${s.by_category.llm}`;q('#pImage').value=p.alert_thresholds.image;q('#pVideo').value=p.alert_thresholds.video;q('#pLlm').value=p.alert_thresholds.llm;userRows=u.users;q('#users').innerHTML=u.users.map(x=>`<tr><td>${esc(x.name)}<small><br>${esc(x.username)}</small></td><td>${esc(x.department)}</td><td>${esc(x.role)}</td><td>${x.enabled?'启用':'停用'}</td><td><input data-q="${x.id}" value="${esc(JSON.stringify(x.quota||{}))}" title="JSON，例如 {&quot;daily_image&quot;:20}"></td><td><button onclick="toggle('${x.id}',${!x.enabled})">${x.enabled?'停用':'启用'}</button></td></tr>`).join('');renderEvents(e.events);q('#alerts').innerHTML=a.alerts.map(x=>`<div class="${x.acknowledged?'':'bad'}">${esc(x.username)}：${esc(x.category)} 在一小时内 ${x.count}/${x.threshold} 次 ${x.acknowledged?'（已确认）':`<button onclick="ack('${x.id}')">确认</button>`}</div>`).join('')||'<small>暂无告警</small>'}
function renderEvents(rows){let f=q('#filter').value.toLowerCase();q('#events').innerHTML=rows.filter(x=>!f||`${x.username} ${x.model} ${x.function}`.toLowerCase().includes(f)).map(x=>`<tr><td>${esc(x.created_at_iso)}</td><td>${esc(x.name||x.username)}<small><br>${esc(x.department)}</small></td><td>${esc(x.client_source)}</td><td>${esc(x.function)}<small><br>${esc(x.provider)} / ${esc(x.model)}</small></td><td class="${x.status==='failed'?'bad':'ok'}">${esc(x.status)}</td><td>${x.duration_ms||0}ms</td></tr>`).join('')}
async function toggle(id,enabled){await send('/api/admin/users/'+id,'PATCH',{enabled});load()}async function ack(id){await send('/api/admin/alerts/'+id,'PATCH',{acknowledged:true});load()}window.toggle=toggle;window.ack=ack;window.returnToWorkspace=returnToWorkspace;q('#savePolicy').onclick=async()=>{await send('/api/admin/usage-policy','PUT',{alert_thresholds:{image:+q('#pImage').value,video:+q('#pVideo').value,llm:+q('#pLlm').value}});load()};q('#refresh').onclick=load;q('#filter').oninput=()=>get('/api/admin/usage?limit=100').then(d=>renderEvents(d.events));q('#logout').onclick=async()=>{await send('/api/auth/logout','POST');window.top.location.href='/static/login.html?v=2026.07.17.1784513061'};load().catch(e=>console.error(e));
</script></body></html>
