<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Infinite Canvas · 登录</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d1117;color:#e6edf3;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}.card{width:min(420px,calc(100vw - 32px));padding:30px;border:1px solid #30363d;border-radius:18px;background:#161b22;box-shadow:0 24px 70px #0008}h1{margin:0 0 6px;font-size:25px}p{color:#8b949e;margin:0 0 22px}label{display:block;margin:12px 0 5px}input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:inherit}button{margin-top:18px;width:100%;padding:11px;border:0;border-radius:8px;background:#58a6ff;color:#07111f;font-weight:700;cursor:pointer}.link{background:transparent;color:#8b949e;margin-top:8px}.form[hidden]{display:none}#message{min-height:22px;margin-top:14px;color:#ff9b9b}.hint{font-size:12px;color:#8b949e}
  </style>
</head>
<body><main class="card">
  <h1>Infinite Canvas</h1><p id="subtitle">请登录后使用公司局域网创作服务</p>
  <form id="loginForm" class="form"><label>账号<input name="username" autocomplete="username" required></label><label>密码<input name="password" type="password" autocomplete="current-password" required></label><button>登录</button><button class="link" type="button" id="showRegister">没有账号？注册</button></form>
  <form id="registerForm" class="form" hidden><label>姓名<input name="name" autocomplete="name" required></label><label>部门<input name="department" required></label><label>账号<input name="username" autocomplete="username" minlength="3" required></label><label>密码<input name="password" type="password" autocomplete="new-password" minlength="10" required></label><button>注册</button><button class="link" type="button" id="showLogin">返回登录</button></form>
  <div id="message" role="alert"></div><div class="hint">首次管理员请在 API/.env 配置 ADMIN_USERNAME 和 ADMIN_PASSWORD 后重启服务。</div>
</main><script>
const $=s=>document.querySelector(s),message=$('#message');
function mode(register){$('#loginForm').hidden=register;$('#registerForm').hidden=!register;$('#subtitle').textContent=register?'填写实名信息，注册后即可使用':'请登录后使用公司局域网创作服务';message.textContent=''}
async function api(path,body){const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'请求失败');return d}
$('#showRegister').onclick=()=>mode(true);$('#showLogin').onclick=()=>mode(false);
$('#loginForm').onsubmit=async e=>{e.preventDefault();try{const d=await api('/api/auth/login',Object.fromEntries(new FormData(e.target)));location.href='/'}catch(err){message.textContent=err.message}};
$('#registerForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/auth/register',Object.fromEntries(new FormData(e.target)));message.style.color='#7ee787';message.textContent='注册成功，请登录。';mode(false)}catch(err){message.style.color='#ff9b9b';message.textContent=err.message}};
</script></body></html>
