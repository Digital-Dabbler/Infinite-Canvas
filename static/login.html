<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Infinite Canvas · 登录</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d1117;color:#e6edf3;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}.card{width:min(420px,calc(100vw - 32px));padding:30px;border:1px solid #30363d;border-radius:18px;background:#161b22;box-shadow:0 24px 70px #0008}h1{margin:0 0 6px;font-size:25px}p{color:#8b949e;margin:0 0 22px}label{display:block;margin:12px 0 5px}input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:inherit}button{margin-top:18px;width:100%;padding:11px;border:0;border-radius:8px;background:#58a6ff;color:#07111f;font-weight:700;cursor:pointer}.link{background:transparent;color:#8b949e;margin-top:8px}.form[hidden]{display:none}.form-actions{display:flex;justify-content:space-between;gap:8px;margin-top:8px}.form-actions .link{width:auto;margin:0;padding:6px 0;text-align:left;font-size:13px;font-weight:600}.form-actions .link:last-child{text-align:right}#message{min-height:22px;margin-top:14px;color:#ff9b9b}.hint{font-size:12px;color:#8b949e}.reset-note{margin:4px 0 14px;font-size:12px;color:#8b949e}
  </style>
</head>
<body><main class="card">
  <h1>Infinite Canvas</h1><p id="subtitle">请登录后使用公司局域网创作服务</p>
  <form id="loginForm" class="form"><label>账号<input name="username" autocomplete="username" required></label><label>密码<input name="password" type="password" autocomplete="current-password" required></label><button>登录</button><div class="form-actions"><button class="link" type="button" id="showRegister">没有账号？注册</button><button class="link" type="button" id="showReset">忘记密码？</button></div></form>
  <form id="registerForm" class="form" hidden><label>姓名<input name="name" autocomplete="name" required></label><label>部门<input name="department" required></label><label>账号<input name="username" autocomplete="username" minlength="3" required></label><label>密码<input name="password" type="password" autocomplete="new-password" minlength="10" required></label><button>注册</button><button class="link" type="button" id="showLogin">返回登录</button></form>
  <form id="resetForm" class="form" hidden><div class="reset-note">请填写注册时使用的姓名和部门进行身份核验。管理员账号请联系系统管理员处理。</div><label>账号<input name="username" autocomplete="username" minlength="3" required></label><label>姓名<input name="name" autocomplete="name" required></label><label>部门<input name="department" required></label><label>新密码<input name="new_password" type="password" autocomplete="new-password" minlength="10" required></label><label>确认新密码<input name="confirm_password" type="password" autocomplete="new-password" minlength="10" required></label><button>重置密码</button><button class="link" type="button" id="showLoginFromReset">返回登录</button></form>
  <div id="message" role="alert"></div><div class="hint">首次管理员请在 API/.env 配置 ADMIN_USERNAME 和 ADMIN_PASSWORD 后重启服务。</div>
</main><script>
const $=s=>document.querySelector(s),message=$('#message');
function mode(view='login'){const register=view==='register',reset=view==='reset';$('#loginForm').hidden=view!=='login';$('#registerForm').hidden=!register;$('#resetForm').hidden=!reset;$('#subtitle').textContent=register?'填写实名信息，注册后即可使用':reset?'核验注册信息后，设置新的登录密码':'请登录后使用公司局域网创作服务';message.textContent='';message.style.color='#ff9b9b'}
async function api(path,body){const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'请求失败');return d}
$('#showRegister').onclick=()=>mode('register');$('#showLogin').onclick=()=>mode();$('#showReset').onclick=()=>mode('reset');$('#showLoginFromReset').onclick=()=>mode();
$('#loginForm').onsubmit=async e=>{e.preventDefault();try{const d=await api('/api/auth/login',Object.fromEntries(new FormData(e.target)));location.href='/'}catch(err){message.textContent=err.message}};
$('#registerForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/auth/register',Object.fromEntries(new FormData(e.target)));mode();message.style.color='#7ee787';message.textContent='注册成功，请登录。'}catch(err){message.style.color='#ff9b9b';message.textContent=err.message}};
$('#resetForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));if(data.new_password!==data.confirm_password){message.textContent='两次输入的新密码不一致。';return}delete data.confirm_password;try{await api('/api/auth/reset-password',data);mode();message.style.color='#7ee787';message.textContent='密码已重置，请使用新密码登录。'}catch(err){message.style.color='#ff9b9b';message.textContent=err.message}};
</script></body></html>
